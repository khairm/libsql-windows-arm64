name: Spike - libsql Windows ARM64 build

# Spike only: prove tursodatabase/libsql-js compiles for aarch64-pc-windows-msvc
# on the native windows-11-arm runner and produces a loadable ARM64 index.node.
# workflow_dispatch ONLY (never auto-runs). The real nightly (with a change-gate
# that builds only when the needed libsql version changes) comes after this proves out.

on:
  workflow_dispatch:
    inputs:
      libsql_version:
        description: libsql version to build (no leading v)
        default: "0.5.22"

jobs:
  spike:
    runs-on: windows-11-arm
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure Rust (rust-toolchain.toml pins 1.88.0)
        shell: pwsh
        run: |
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Write-Host "Installing rustup (aarch64)..."
            Invoke-WebRequest https://static.rust-lang.org/rustup/dist/aarch64-pc-windows-msvc/rustup-init.exe -OutFile rustup-init.exe
            ./rustup-init.exe -y --default-toolchain none --profile minimal
            Add-Content $env:GITHUB_PATH "$env:USERPROFILE\.cargo\bin"
          } else {
            Write-Host "rustup present: $((Get-Command rustup).Source)"
          }

      - name: Clone libsql-js @ version
        shell: bash
        run: |
          V="${{ github.event.inputs.libsql_version }}"
          echo "Building libsql-js v$V"
          git clone --depth 1 --branch "v$V" https://github.com/tursodatabase/libsql-js.git libsql-js
          echo "LIBSQL_VERSION=$V" >> "$GITHUB_ENV"

      - name: Rust toolchain + target
        working-directory: libsql-js
        shell: bash
        run: |
          rustup show
          rustup target add aarch64-pc-windows-msvc || true
          rustc -vV
          cargo -V

      - name: Patch neon.targets (add aarch64-pc-windows-msvc)
        working-directory: libsql-js
        shell: pwsh
        run: |
          $raw = Get-Content -Raw package.json
          $p = $raw | ConvertFrom-Json
          if (-not $p.neon) { Write-Error "no neon config in package.json"; exit 1 }
          if (-not $p.neon.targets.'x86_64-pc-windows-msvc') {
            Write-Error "expected x86_64-pc-windows-msvc mapping not present (upstream structure changed)"; exit 1
          }
          if (-not $p.neon.targets.'aarch64-pc-windows-msvc') {
            $p.neon.targets | Add-Member -NotePropertyName 'aarch64-pc-windows-msvc' -NotePropertyValue '@libsql/win32-arm64-msvc'
            ($p | ConvertTo-Json -Depth 64) | Set-Content -Path package.json -NoNewline
            Write-Host "Added aarch64-pc-windows-msvc -> @libsql/win32-arm64-msvc"
          }
          (Get-Content -Raw package.json | ConvertFrom-Json).neon.targets | ConvertTo-Json

      - name: Enable corepack + yarn install
        working-directory: libsql-js
        shell: bash
        run: |
          corepack enable || npm i -g corepack
          yarn install --frozen-lockfile 2>&1 | tail -40 || yarn install 2>&1 | tail -40

      - name: Locate libclang (libSQL bindgen needs it)
        shell: pwsh
        run: |
          $cands = Get-ChildItem -Path 'C:\Program Files\Microsoft Visual Studio\2022' -Recurse -Filter libclang.dll -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $cands) { $cands = Get-ChildItem -Path 'C:\Program Files\LLVM' -Recurse -Filter libclang.dll -ErrorAction SilentlyContinue | Select-Object -First 1 }
          if ($cands) {
            Add-Content $env:GITHUB_ENV "LIBCLANG_PATH=$($cands.DirectoryName)"
            Write-Host "LIBCLANG_PATH=$($cands.DirectoryName)"
          } else {
            Write-Host "::warning::libclang.dll not found; bindgen may fail (will surface in build)"
          }

      - name: Cargo build (release, aarch64-pc-windows-msvc)
        working-directory: libsql-js
        shell: bash
        env:
          CARGO_TERM_COLOR: always
        run: |
          set -eo pipefail
          # Neon cdylib: cargo produces a normal DLL that IS the Node addon once renamed
          # .node (confirmed: no neon dist / symbol rewrite / trailer needed). Bypass the
          # fragile neon-rs 0.0.165 CLI entirely.
          cargo build --release --target aarch64-pc-windows-msvc 2> ../cargo-stderr.log \
            || { echo "CARGO FAILED:"; tail -80 ../cargo-stderr.log; exit 1; }
          echo "--- cdylib artifacts ---"
          ls -la "target/aarch64-pc-windows-msvc/release"/*.dll 2>/dev/null || true

      - name: Package + verify @libsql/win32-arm64-msvc (deterministic, no neon CLI)
        working-directory: libsql-js
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $rel = 'target\aarch64-pc-windows-msvc\release'
          $dll = Join-Path $rel 'libsql_js.dll'
          if (-not (Test-Path $dll)) {
            # Fallback: the crate cdylib, excluding build-script/dep dlls
            $cand = Get-ChildItem "$rel\*.dll" -ErrorAction SilentlyContinue |
                    Where-Object { $_.Name -notmatch '^(api-ms|vcruntime|msvcp)' } |
                    Sort-Object Length -Descending | Select-Object -First 1
            if (-not $cand) { Write-Error "No cdylib .dll in $rel"; Get-ChildItem $rel -ErrorAction SilentlyContinue; exit 1 }
            $dll = $cand.FullName
          }
          Write-Host "cdylib: $dll"
          # PE machine check -> must be ARM64 (0xAA64)
          $fs=[IO.File]::OpenRead($dll);$br=New-Object IO.BinaryReader($fs);$fs.Position=0x3C;$pe=$br.ReadInt32();$fs.Position=$pe+4;$m=$br.ReadUInt16();$br.Close()
          $arch = if($m -eq 0xAA64){'ARM64'} elseif($m -eq 0x8664){'x64'} else {('0x{0:X}' -f $m)}
          Write-Host "cdylib arch: $arch  size: $((Get-Item $dll).Length)"
          if ($m -ne 0xAA64) { Write-Error "cdylib is NOT ARM64 ($arch)"; exit 1 }

          $stage = "$env:GITHUB_WORKSPACE\artifact"
          New-Item -ItemType Directory -Force $stage | Out-Null
          Copy-Item $dll "$stage\index.node" -Force
          $v = $env:LIBSQL_VERSION
          @"
          {
            "name": "@libsql/win32-arm64-msvc",
            "version": "$v",
            "os": ["win32"],
            "cpu": ["arm64"],
            "main": "index.node"
          }
          "@ | Set-Content "$stage\package.json"

          # Definitive proof: load the addon under (ARM64) Node.
          $addon = (Resolve-Path "$stage\index.node").Path
          node -e "require(process.argv[1]); console.log('ADDON LOADED OK')" "$addon"
          if ($LASTEXITCODE -ne 0) { Write-Error "index.node failed to load under Node"; exit 1 }
          Get-ChildItem $stage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libsql-win32-arm64-msvc
          path: artifact/

      - name: Upload cargo stderr (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-stderr
          path: cargo-stderr.log
          if-no-files-found: ignore
